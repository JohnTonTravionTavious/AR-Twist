<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Twist — Knife Behind Back (Nara)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "nara-poster",
          "type": "PLANAR",
          "imagePath": "assets/Targets/nara_knife_behind_back.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 886, "height": 998,
            "originalWidth": 886, "originalHeight": 998,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body style="margin:0;overflow:hidden;">
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="nara-base" src="assets/Targets/nara_knife_behind_back.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="nara-poster">

      <!--
        STEP A — alignment calibration.
        Digital Nara overlay at 60% opacity over the tracked print.
        Goal: confirm whether the base image aligns 1:1 with the printed image,
        and identify which 3D axis corresponds to the painting's vertical axis
        (top-of-painting → bottom-of-painting).

        Trying convention: image lies flat in XZ plane (Y up perpendicular).
        Width 1.0, height = aspect ratio 998/886 = 1.126.
      -->
      <!--
        Trying rotation -90 0 90 = lay flat (-90 around X) + roll 90 around local Z
        to un-rotate the texture by 90 degrees on the plane. If image is still
        90 deg off, swap to -90 0 -90. Width/height swapped to 1.126 x 1.0 since
        the image now spins so its long axis lies along world X.
      -->
      <a-image
        src="#nara-base"
        width="1.126"
        height="1.0"
        position="0 0.001 0"
        rotation="-90 0 90"
        material="transparent: true; opacity: 0.6; side: double">
      </a-image>

      <!--
        Axis markers — small colored boxes at each "corner" of my assumed coordinate system.
        Helps identify which 3D axis matches the painting's vertical/horizontal.
        - RED   = +X (assumed: image right)
        - GREEN = -X (assumed: image left)
        - BLUE  = +Z (assumed: image bottom — toward viewer)
        - YELLOW= -Z (assumed: image top — away from viewer)
      -->
      <a-box position=" 0.5 0.02  0"    width="0.06" height="0.04" depth="0.06" color="red"></a-box>
      <a-box position="-0.5 0.02  0"    width="0.06" height="0.04" depth="0.06" color="green"></a-box>
      <a-box position=" 0   0.02  0.56" width="0.06" height="0.04" depth="0.06" color="blue"></a-box>
      <a-box position=" 0   0.02 -0.56" width="0.06" height="0.04" depth="0.06" color="yellow"></a-box>

    </xrextras-named-image-target>

  </a-scene>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init()</script>
</body>
</html>
