<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Twist — Knife Behind Back (Nara)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "nara-poster",
          "type": "PLANAR",
          "imagePath": "assets/Targets/nara_knife_behind_back.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 886, "height": 998,
            "originalWidth": 886, "originalHeight": 998,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Chromakey shader — parameterized threshold + falloff (extended from
       b2renger example 05 which hardcoded 0.75 + 7.0).
       For a black background (0,0,0) the original 0.75 threshold ate dark
       grays out of the weapons too; threshold 0.10 + falloff 20 cleanly
       removes pure-black background only. -->
  <script>
    AFRAME.registerShader('chromakey', {
      schema: {
        src:        {type: 'map'},
        color:      {type: 'color',  default: '#00FF00'},
        chroma:     {type: 'bool',   default: true},
        threshold:  {type: 'number', default: 0.75},
        falloff:    {type: 'number', default: 7.0},
        transparent:{default: true}
      },
      init: function (data) {
        const videoEl = data.src;
        if (!videoEl) return;
        const videoTexture = new THREE.VideoTexture(videoEl);
        videoTexture.minFilter = THREE.LinearFilter;
        this.material = new THREE.ShaderMaterial({
          transparent: data.transparent,
          uniforms: {
            chroma:    {type: 'b', value: data.chroma},
            color:     {type: 'c', value: new THREE.Color(data.color)},
            threshold: {type: 'f', value: data.threshold},
            falloff:   {type: 'f', value: data.falloff},
            myTexture: {type: 't', value: videoTexture}
          },
          vertexShader: this.vertexShader,
          fragmentShader: this.fragmentShader
        });
      },
      update: function (data) {
        this.material.uniforms.chroma.value    = data.chroma;
        this.material.uniforms.color.value.set(data.color);
        this.material.uniforms.threshold.value = data.threshold;
        this.material.uniforms.falloff.value   = data.falloff;
        this.material.transparent              = data.transparent;
      },
      vertexShader: [
        'varying vec2 vUv;',
        'void main(void) {',
        '  vUv = uv;',
        '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform sampler2D myTexture;',
        'uniform vec3 color;',
        'uniform bool chroma;',
        'uniform float threshold;',
        'uniform float falloff;',
        'varying vec2 vUv;',
        'void main(void) {',
        '  vec3 tColor = texture2D(myTexture, vUv).rgb;',
        '  float a = 1.0;',
        '  if (chroma) {',
        '    a = (length(tColor - color) - threshold) * falloff;',
        '  }',
        '  gl_FragColor = vec4(tColor, a);',
        '}'
      ].join('\n')
    });
  </script>

  <!-- Weapon cycler — TWO-PHASE per weapon:
         Phase A (DRAWING) : video plays 0 -> midpoint, then pauses
                             at "weapon drawn" frame.
         Phase B (SHEATHING): on next tap, video resumes mid -> end,
                             on `ended` we chain into Phase A of the
                             next weapon (or back to IDLE if this was
                             the last).
       Taps during DRAWING / SHEATHING are ignored (no interrupt).
  -->
  <script>
    AFRAME.registerComponent('weapon-cycler', {
      schema: {
        weaponIds: {type: 'array'},
        videoIds:  {type: 'array'}
      },
      init: function () {
        this.state = 0;          // 0=idle, 1..N = which weapon is current
        this.subState = 'idle';  // 'idle' | 'drawing' | 'drawn' | 'sheathing'
        this.weapons = this.data.weaponIds.map(id => document.getElementById(id));
        this.videos  = this.data.videoIds.map(id => document.getElementById(id));

        // Reset everything; loop must be OFF so we can listen for `ended`.
        this.videos.forEach(v => {
          try { v.pause(); v.currentTime = 0; v.loop = false; } catch (e) {}
        });

        this.el.addEventListener('click', () => this.onTap());
      },

      onTap: function () {
        if (this.subState === 'idle') {
          this.startDrawing(1);
        } else if (this.subState === 'drawn') {
          this.startSheathing();
        } else {
          console.log('[weapon-cycler] tap ignored during', this.subState);
        }
      },

      startDrawing: function (weaponNum) {
        const idx = weaponNum - 1;
        if (idx < 0 || idx >= this.weapons.length) {
          this.state = 0; this.subState = 'idle';
          return;
        }
        this.state = weaponNum;
        this.subState = 'drawing';

        const weapon = this.weapons[idx];
        const video  = this.videos[idx];

        weapon.setAttribute('visible', true);
        try { video.currentTime = 0; } catch (e) {}

        // Pause video at midpoint via a timeupdate listener.
        const pauseAtMid = () => {
          if (!video.duration) return;
          if (video.currentTime >= video.duration / 2) {
            video.pause();
            video.removeEventListener('timeupdate', pauseAtMid);
            this.subState = 'drawn';
            console.log('[weapon-cycler] DRAWN weapon', this.state, 'paused at t=', video.currentTime.toFixed(2));
          }
        };
        video.addEventListener('timeupdate', pauseAtMid);

        video.play().catch(e => console.warn('[weapon-cycler] play() rejected:', e));
        console.log('[weapon-cycler] DRAWING weapon', this.state);
      },

      startSheathing: function () {
        const idx = this.state - 1;
        const video  = this.videos[idx];
        const weapon = this.weapons[idx];
        this.subState = 'sheathing';

        const onEnded = () => {
          video.removeEventListener('ended', onEnded);
          weapon.setAttribute('visible', false);
          try { video.pause(); video.currentTime = 0; } catch (e) {}

          if (this.state < this.weapons.length) {
            // Chain into next weapon's draw phase.
            this.startDrawing(this.state + 1);
          } else {
            this.state = 0;
            this.subState = 'idle';
            console.log('[weapon-cycler] cycle complete -> IDLE');
          }
        };
        video.addEventListener('ended', onEnded);

        video.play().catch(e => console.warn('[weapon-cycler] play() rejected:', e));
        console.log('[weapon-cycler] SHEATHING weapon', this.state);
      }
    });
  </script>
</head>
<body style="margin:0;overflow:hidden;">
  <a-scene
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="nara-base" src="assets/Targets/nara_knife_behind_back_transparent.png" crossorigin="anonymous">

      <!-- User-produced weapon videos (black chroma bg). Note: spec called
           for green #00FF00 but exported bg is black; shader threshold is
           tightened to preserve dark parts of the weapons. -->
      <video id="weapon-1-vid" src="assets/weapons/knife.mp4" muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-2-vid" src="assets/weapons/gun.mp4"   muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-3-vid" src="assets/weapons/tnt.mp4" muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="nara-poster">

      <a-image
        src="#nara-base"
        width="0.97"
        height="1.092"
        position="0 0 0.001"
        material="opacity: 1.0; side: double">
      </a-image>

      <!-- Weapon planes 1 & 2: shifted by (-17.5 px, -76 px) computed from
           bbox analysis of the first frame vs. the base Nara PNG. The Nara
           in these videos is the same size, just lower-right in the canvas.
           Translation in 3D: x=-0.0198, y=+0.0858 (Y is up). -->
      <!-- weapon-1 (knife): WHITE bg version. AA fringe is light-colored
           rather than dark, so it visually disappears against the base PNG. -->
      <a-entity
        id="weapon-1"
        visible="false"
        geometry="primitive: plane; width: 0.97; height: 1.092"
        material="shader: chromakey; src: #weapon-1-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005">
      </a-entity>

      <a-entity
        id="weapon-2"
        visible="false"
        geometry="primitive: plane; width: 0.97; height: 1.092"
        material="shader: chromakey; src: #weapon-2-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005">
      </a-entity>

      <a-entity
        id="weapon-3"
        visible="false"
        geometry="primitive: plane; width: 0.97; height: 1.092"
        material="shader: chromakey; src: #weapon-3-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005">
      </a-entity>

      <!-- Tap zone — fully transparent (opacity 0) but still raycaster-clickable
           thanks to the .clickable class. Keep material with transparent:true
           so it actually disappears visually but the geometry stays for hit-test. -->
      <a-plane
        class="clickable"
        id="tap-zone"
        position="-0.139 -0.187 0.010"
        width="0.248"
        height="0.293"
        material="transparent: true; opacity: 0; side: double"
        weapon-cycler="weaponIds: weapon-1, weapon-2, weapon-3; videoIds: weapon-1-vid, weapon-2-vid, weapon-3-vid">
      </a-plane>

    </xrextras-named-image-target>

  </a-scene>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init()</script>
</body>
</html>
