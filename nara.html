<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Twist — Knife Behind Back (Nara)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "nara-poster",
          "type": "PLANAR",
          "imagePath": "assets/Targets/nara_knife_behind_back.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 886, "height": 998,
            "originalWidth": 886, "originalHeight": 998,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!--
    Weapon cycler — 6 weapons in escalation order, loop back to idle:
      scissors -> cutting_knife -> knife -> gun -> bomb -> grenade -> idle -> ...
    Each weapon plays in 2 phases:
      Phase A (draw)    : 0 -> midpoint, paused at "drawn"
      Phase B (sheathe) : next tap, midpoint -> end, then chain to next.
    Taps during animations are ignored.
  -->
  <script>
    AFRAME.registerComponent('weapon-cycler', {
      schema: {
        weaponIds: {type: 'array'},
        videoIds:  {type: 'array'}
      },
      init: function () {
        this.state = 0;
        this.subState = 'idle';
        this.weapons = this.data.weaponIds.map(id => document.getElementById(id));
        this.videos  = this.data.videoIds.map(id => document.getElementById(id));

        this.videos.forEach(v => {
          try { v.pause(); v.currentTime = 0; v.loop = false; } catch (e) {}
        });

        this.el.addEventListener('click', () => this.onTap());
      },

      onTap: function () {
        if (this.subState === 'idle') {
          this.startDrawing(1);
        } else if (this.subState === 'drawn') {
          this.startSheathing();
        } else {
          console.log('[cycler] tap ignored during', this.subState);
        }
      },

      startDrawing: function (n) {
        const i = n - 1;
        if (i < 0 || i >= this.weapons.length) {
          this.state = 0; this.subState = 'idle'; return;
        }
        this.state = n;
        this.subState = 'drawing';

        const w = this.weapons[i];
        const v = this.videos[i];
        w.setAttribute('visible', true);
        try { v.currentTime = 0; } catch (e) {}

        const pauseAtMid = () => {
          if (!v.duration) return;
          if (v.currentTime >= v.duration / 2) {
            v.pause();
            v.removeEventListener('timeupdate', pauseAtMid);
            this.subState = 'drawn';
            console.log('[cycler] DRAWN', w.id, 't=', v.currentTime.toFixed(2));
          }
        };
        v.addEventListener('timeupdate', pauseAtMid);
        v.play().catch(e => console.warn('[cycler] play:', e));
        console.log('[cycler] DRAWING', w.id);
      },

      startSheathing: function () {
        const i = this.state - 1;
        const v = this.videos[i];
        const w = this.weapons[i];
        this.subState = 'sheathing';

        const onEnded = () => {
          v.removeEventListener('ended', onEnded);
          w.setAttribute('visible', false);
          try { v.pause(); v.currentTime = 0; } catch (e) {}

          if (this.state < this.weapons.length) {
            this.startDrawing(this.state + 1);
          } else {
            this.state = 0;
            this.subState = 'idle';
            console.log('[cycler] cycle complete -> IDLE');
          }
        };
        v.addEventListener('ended', onEnded);
        v.play().catch(e => console.warn('[cycler] play:', e));
        console.log('[cycler] SHEATHING', w.id);
      }
    });
  </script>
</head>
<body style="margin:0;overflow:hidden;">
  <a-scene
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="nara-base" src="assets/Targets/nara_knife_behind_back_transparent.png" crossorigin="anonymous">

      <!-- 6 weapons (WebM VP9 alpha — real transparent background, no chroma). -->
      <video id="weapon-1-vid" src="assets/weapons/scissors.webm"      muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-2-vid" src="assets/weapons/cutting_knife.webm" muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-3-vid" src="assets/weapons/knife.webm"         muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-4-vid" src="assets/weapons/gun.webm"           muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-5-vid" src="assets/weapons/bomb.webm"          muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-6-vid" src="assets/weapons/grenade.webm"       muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="nara-poster">

      <!-- Base Nara overlay (alpha PNG with 2 px erosion to hide bleed-through) -->
      <a-image
        src="#nara-base"
        width="0.98"
        height="1.103"
        position="0 0 0.001"
        material="opacity: 1.0; side: double">
      </a-image>

      <!-- Weapon planes — alpha-aware standard material (no chroma needed) -->
      <a-entity id="weapon-1" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="src: #weapon-1-vid; transparent: true; alphaTest: 0.01; side: double; shader: flat"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-2" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="src: #weapon-2-vid; transparent: true; alphaTest: 0.01; side: double; shader: flat"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-3" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="src: #weapon-3-vid; transparent: true; alphaTest: 0.01; side: double; shader: flat"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-4" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="src: #weapon-4-vid; transparent: true; alphaTest: 0.01; side: double; shader: flat"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-5" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="src: #weapon-5-vid; transparent: true; alphaTest: 0.01; side: double; shader: flat"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-6" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="src: #weapon-6-vid; transparent: true; alphaTest: 0.01; side: double; shader: flat"
        position="-0.0198 0.0858 0.005"></a-entity>

      <!-- Single invisible tap zone (centered on dress, left side). -->
      <a-plane class="clickable" id="tap-zone"
        position="-0.139 -0.187 0.030"
        width="0.248" height="0.293"
        material="transparent: true; opacity: 0; side: double"
        weapon-cycler="
          weaponIds: weapon-1, weapon-2, weapon-3, weapon-4, weapon-5, weapon-6;
          videoIds:  weapon-1-vid, weapon-2-vid, weapon-3-vid, weapon-4-vid, weapon-5-vid, weapon-6-vid"></a-plane>

    </xrextras-named-image-target>

  </a-scene>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init()</script>
</body>
</html>
