<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Twist — Knife Behind Back (Nara)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "nara-poster",
          "type": "PLANAR",
          "imagePath": "assets/Targets/nara_knife_behind_back.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 886, "height": 998,
            "originalWidth": 886, "originalHeight": 998,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body style="margin:0;overflow:hidden;">
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="nara-base" src="assets/Targets/nara_knife_behind_back.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="nara-poster">

      <!--
        Step A.3 — CORRECTED axis convention.
        Diagnosed from user screenshot: 8th Wall image-target local frame is
        image-plane = XY, perpendicular = Z (toward viewer).
        => No rotation on overlay. Default A-Frame plane (XY, normal +Z) already
        matches the image plane.
        Width 1.0, height 1.126 = aspect ratio 998/886.
      -->
      <a-image
        src="#nara-base"
        width="1.0"
        height="1.126"
        position="0 0 0.001"
        material="transparent: true; opacity: 0.6; side: double">
      </a-image>

      <!--
        Axis markers (CORRECTED):
        - RED   = +X (image right)
        - GREEN = -X (image left)
        - BLUE  = +Y (image top — above hair)
        - YELLOW= -Y (image bottom — below feet)
        Slightly in front of image plane (Z=0.005) so they're visible.
      -->
      <a-box position=" 0.5    0     0.005" width="0.06" height="0.06" depth="0.04" color="red"></a-box>
      <a-box position="-0.5    0     0.005" width="0.06" height="0.06" depth="0.04" color="green"></a-box>
      <a-box position=" 0      0.563 0.005" width="0.06" height="0.06" depth="0.04" color="blue"></a-box>
      <a-box position=" 0     -0.563 0.005" width="0.06" height="0.06" depth="0.04" color="yellow"></a-box>

    </xrextras-named-image-target>

  </a-scene>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init()</script>
</body>
</html>
