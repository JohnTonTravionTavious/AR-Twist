<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Twist — Knife Behind Back (Nara)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "nara-poster",
          "type": "PLANAR",
          "imagePath": "assets/Targets/nara_knife_behind_back.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 886, "height": 998,
            "originalWidth": 886, "originalHeight": 998,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    AFRAME.registerComponent('reveal-zone', {
      schema: {
        color: {type: 'color', default: '#ff0000'},
        label: {type: 'string', default: 'zone'}
      },
      init: function () {
        const el = this.el;
        const {color, label} = this.data;
        el.addEventListener('click', () => {
          console.log('[reveal-zone] tapped:', label);
          el.setAttribute('material', 'opacity', 0.75);
          clearTimeout(el._flashTimer);
          el._flashTimer = setTimeout(() => {
            el.setAttribute('material', 'opacity', 0.30);
          }, 600);
        });
      }
    });
  </script>
</head>
<body style="margin:0;overflow:hidden;">
  <a-scene
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="nara-base" src="assets/Targets/nara_knife_behind_back.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="nara-poster">

      <!-- Step B — Base overlay full opacity + 3 reveal zones at pixel-derived positions. -->
      <a-image
        src="#nara-base"
        width="1.0"
        height="1.126"
        position="0 0 0.001"
        material="opacity: 1.0; side: double">
      </a-image>

      <!-- Hair zone (top of head, brown bob) -->
      <a-plane
        class="clickable"
        id="zone-hair"
        position="-0.015 0.332 0.007"
        width="0.564"
        height="0.305"
        color="#e6c200"
        material="transparent: true; opacity: 0.30; side: double"
        reveal-zone="color: #e6c200; label: hair">
      </a-plane>

      <!-- Face zone (angry eyes + mouth) -->
      <a-plane
        class="clickable"
        id="zone-face"
        position="-0.015 0.123 0.007"
        width="0.361"
        height="0.180"
        color="#ff7a1a"
        material="transparent: true; opacity: 0.30; side: double"
        reveal-zone="color: #ff7a1a; label: face">
      </a-plane>

      <!-- Hand zone (character's left hand — hidden behind body, the one holding the knife).
           Pixel center (590, 620) on the image right side, at hip level. -->
      <a-plane
        class="clickable"
        id="zone-hand"
        position="0.166 -0.137 0.007"
        width="0.169"
        height="0.180"
        color="#d62828"
        material="transparent: true; opacity: 0.30; side: double"
        reveal-zone="color: #d62828; label: hand-knife">
      </a-plane>

    </xrextras-named-image-target>

  </a-scene>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init()</script>
</body>
</html>
