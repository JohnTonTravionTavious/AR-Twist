<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Twist — Knife Behind Back (Nara)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "nara-poster",
          "type": "PLANAR",
          "imagePath": "assets/Targets/nara_knife_behind_back.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 886, "height": 998,
            "originalWidth": 886, "originalHeight": 998,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Chromakey shader (extended from b2renger example 05 — parameterized
       threshold/falloff + discard of pure-black uninitialized texture). -->
  <script>
    AFRAME.registerShader('chromakey', {
      schema: {
        src:        {type: 'map'},
        color:      {type: 'color',  default: '#FFFFFF'},
        chroma:     {type: 'bool',   default: true},
        threshold:  {type: 'number', default: 0.20},
        falloff:    {type: 'number', default: 20.0},
        transparent:{default: true}
      },
      init: function (data) {
        const videoEl = data.src;
        if (!videoEl) return;
        const videoTexture = new THREE.VideoTexture(videoEl);
        videoTexture.minFilter = THREE.LinearFilter;
        this.material = new THREE.ShaderMaterial({
          transparent: data.transparent,
          uniforms: {
            chroma:    {type: 'b', value: data.chroma},
            color:     {type: 'c', value: new THREE.Color(data.color)},
            threshold: {type: 'f', value: data.threshold},
            falloff:   {type: 'f', value: data.falloff},
            myTexture: {type: 't', value: videoTexture}
          },
          vertexShader: this.vertexShader,
          fragmentShader: this.fragmentShader
        });
      },
      update: function (data) {
        this.material.uniforms.chroma.value = data.chroma;
        this.material.uniforms.color.value.set(data.color);
        this.material.uniforms.threshold.value = data.threshold;
        this.material.uniforms.falloff.value = data.falloff;
        this.material.transparent = data.transparent;
      },
      vertexShader: [
        'varying vec2 vUv;',
        'void main(void) {',
        '  vUv = uv;',
        '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform sampler2D myTexture;',
        'uniform vec3 color;',
        'uniform bool chroma;',
        'uniform float threshold;',
        'uniform float falloff;',
        'varying vec2 vUv;',
        'void main(void) {',
        '  vec3 tColor = texture2D(myTexture, vUv).rgb;',
        '  // discard pure-black uninitialized-texture pixels (kills the',
        '  // transient flash between weapon transitions).',
        '  if (length(tColor) < 0.02) discard;',
        '  float a = 1.0;',
        '  if (chroma) {',
        '    a = (length(tColor - color) - threshold) * falloff;',
        '  }',
        '  gl_FragColor = vec4(tColor, a);',
        '}'
      ].join('\n')
    });
  </script>

  <!-- 6-weapon cycler. Order: scissors -> cutting_knife -> knife -> gun
       -> bomb -> grenade -> idle -> ... Each weapon plays in 2 phases
       (draw -> pause at midpoint; sheathe -> ended -> chain to next). -->
  <script>
    AFRAME.registerComponent('weapon-cycler', {
      schema: {
        weaponIds: {type: 'array'},
        videoIds:  {type: 'array'}
      },
      init: function () {
        this.state = 0;
        this.subState = 'idle';
        this.weapons = this.data.weaponIds.map(id => document.getElementById(id));
        this.videos  = this.data.videoIds.map(id => document.getElementById(id));

        this.videos.forEach(v => {
          try { v.pause(); v.currentTime = 0; v.loop = false; } catch (e) {}
        });

        this.el.addEventListener('click', () => this.onTap());
      },

      onTap: function () {
        if (this.subState === 'idle') {
          this.startDrawing(1);
        } else if (this.subState === 'drawn') {
          this.startSheathing();
        } else {
          console.log('[cycler] tap ignored during', this.subState);
        }
      },

      startDrawing: function (n) {
        const i = n - 1;
        if (i < 0 || i >= this.weapons.length) {
          this.state = 0; this.subState = 'idle'; return;
        }
        this.state = n;
        this.subState = 'drawing';

        const w = this.weapons[i];
        const v = this.videos[i];
        w.setAttribute('visible', true);
        try { v.currentTime = 0; } catch (e) {}

        const pauseAtMid = () => {
          if (!v.duration) return;
          if (v.currentTime >= v.duration / 2) {
            v.pause();
            v.removeEventListener('timeupdate', pauseAtMid);
            this.subState = 'drawn';
            console.log('[cycler] DRAWN', w.id, 't=', v.currentTime.toFixed(2));
          }
        };
        v.addEventListener('timeupdate', pauseAtMid);
        v.play().catch(e => console.warn('[cycler] play:', e));
        console.log('[cycler] DRAWING', w.id);
      },

      startSheathing: function () {
        const i = this.state - 1;
        const v = this.videos[i];
        const w = this.weapons[i];
        this.subState = 'sheathing';

        const onEnded = () => {
          v.removeEventListener('ended', onEnded);
          w.setAttribute('visible', false);
          try { v.pause(); v.currentTime = 0; } catch (e) {}

          if (this.state < this.weapons.length) {
            this.startDrawing(this.state + 1);
          } else {
            this.state = 0;
            this.subState = 'idle';
            console.log('[cycler] cycle complete -> IDLE');
          }
        };
        v.addEventListener('ended', onEnded);
        v.play().catch(e => console.warn('[cycler] play:', e));
        console.log('[cycler] SHEATHING', w.id);
      }
    });
  </script>
</head>
<body style="margin:0;overflow:hidden;">
  <a-scene
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="nara-base" src="assets/Targets/nara_knife_behind_back_transparent.png" crossorigin="anonymous">

      <!-- 6 weapons (MP4, alpha composited over pure white; the chroma
           shader removes the white at render time). -->
      <video id="weapon-1-vid" src="assets/weapons/scissors.mp4"      muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-2-vid" src="assets/weapons/cutting_knife.mp4" muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-3-vid" src="assets/weapons/knife.mp4"         muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-4-vid" src="assets/weapons/gun.mp4"           muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-5-vid" src="assets/weapons/bomb.mp4"          muted playsinline crossorigin="anonymous"></video>
      <video id="weapon-6-vid" src="assets/weapons/grenade.mp4"       muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="nara-poster">

      <a-image
        src="#nara-base"
        width="0.98"
        height="1.103"
        position="0 0 0.001"
        material="opacity: 1.0; side: double">
      </a-image>

      <a-entity id="weapon-1" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="shader: chromakey; src: #weapon-1-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-2" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="shader: chromakey; src: #weapon-2-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-3" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="shader: chromakey; src: #weapon-3-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-4" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="shader: chromakey; src: #weapon-4-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-5" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="shader: chromakey; src: #weapon-5-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-entity id="weapon-6" visible="false"
        geometry="primitive: plane; width: 0.98; height: 1.103"
        material="shader: chromakey; src: #weapon-6-vid; chroma: true; color: #FFFFFF; threshold: 0.20; falloff: 20"
        position="-0.0198 0.0858 0.005"></a-entity>

      <a-plane class="clickable" id="tap-zone"
        position="-0.139 -0.187 0.030"
        width="0.248" height="0.293"
        material="transparent: true; opacity: 0; side: double"
        weapon-cycler="
          weaponIds: weapon-1, weapon-2, weapon-3, weapon-4, weapon-5, weapon-6;
          videoIds:  weapon-1-vid, weapon-2-vid, weapon-3-vid, weapon-4-vid, weapon-5-vid, weapon-6-vid"></a-plane>

    </xrextras-named-image-target>

  </a-scene>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init()</script>
</body>
</html>
